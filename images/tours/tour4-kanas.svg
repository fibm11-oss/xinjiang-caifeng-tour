  <!-- Lake -->
  <ellipse cx="400" cy="440" rx="300" ry="40" fill="#3498db" opacity="0.7"/>
  <text x="400" y="200" text-anchor="middle" font-family="'Microsoft YaHei','PingFang TC','Noto Sans TC',sans-serif" font-size="34" font-weight="bold" fill="#fff" stroke="#000" stroke-width="1" opacity="0.95">北疆喀納斯8日</text>
  <text x="400" y="245" text-anchor="middle" font-family="'Microsoft YaHei','PingFang TC','Noto Sans TC',sans-serif" font-size="17" fill="#fff" opacity="0.85">喀納斯湖 · 禾木村 · 魔鬼城</text>
</svg>
