  <rect x="115" y="400" width="10" height="25" fill="#795548"/>
  <polygon points="250,380 270,310 290,380" fill="#2ecc71"/>
  <rect x="265" y="380" width="10" height="25" fill="#795548"/>
  <polygon points="550,390 570,320 590,390" fill="#27ae60"/>
  <rect x="565" y="390" width="10" height="25" fill="#795548"/>
  <polygon points="700,370 720,300 740,370" fill="#2ecc71"/>
