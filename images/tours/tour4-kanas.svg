<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0.9"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Snow mountains -->
  <polygon points="0,350 150,200 300,300 500,180 700,280 800,250 800,500 0,500" fill="#ecf0f1" opacity="0.8"/>
  <!-- Pine trees -->
